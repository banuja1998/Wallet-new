# =================================================
# = SERVER CONFIGURATION
# =================================================
server.port=8086
server.servlet.context-path=/expanse-management-system
spring.application.name=Expanse-Management-System

# =================================================
# = DATABASE CONFIGURATION (PostgreSQL)
# =================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/Ex2
spring.datasource.username=postgres
spring.datasource.password=root
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Driver is optional in Spring Boot 3, but OK to keep:
spring.datasource.driver-class-name=org.postgresql.Driver

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# =================================================
# = JPA / HIBERNATE CONFIGURATION
# =================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# =================================================
# = LOGGING CONFIGURATION
# =================================================
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =================================================
# = FILE UPLOAD
# =================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =================================================
# = EMAIL CONFIGURATION
# =================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=hrmtest369@gmail.com
spring.mail.password=uhegkkwozpbgubyy
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.enable=false

# =================================================
# = JSON & DATE TIME
# =================================================
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=UTC

# =================================================
# = MVC SETTINGS
# =================================================
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER
spring.main.allow-circular-references=true
spring.main.allow-bean-definition-overriding=true
spring.main.banner-mode=off

# =================================================
# = FRONTEND INTEGRATIONS
# =================================================
bms.web.url=http://localhost:3000
bms.api.url=http://localhost:8085/expanse-management-system/api/v1


